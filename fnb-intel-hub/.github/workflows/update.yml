name: 🔄 Tự động cập nhật tin F&B

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-fnb-news:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: 📦 Cài thư viện
        run: pip install feedparser
      - name: 📰 Fetch tin F&B từ RSS
        run: python fetch_news.py
      - name: 💾 Commit và push news.json
        run: |
          git config user.name "F&B Intel Bot 🤖"
          git config user.email "actions@github.com"
          git add news.json
          git diff --staged --quiet || (
            git commit -m "🔄 Cập nhật tin tức: $(date -u '+%d/%m/%Y %H:%M') UTC" &&
            git push
          )
